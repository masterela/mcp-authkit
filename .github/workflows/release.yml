name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  id-token: write   # OIDC trusted publishing — no PYPI_TOKEN needed
  contents: write   # create GitHub Release

jobs:
  release:
    name: Build, publish & release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No token required — uses OIDC.  One-time setup on PyPI:
        #   pypi.org → Account settings → Publishing → Add trusted publisher
        #     owner: masterela  repo: mcp-authkit  workflow: release.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

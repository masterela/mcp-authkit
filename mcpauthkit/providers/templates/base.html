<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MCP Authentication{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(150deg, #eef2f8 0%, #e4ebf5 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a2035;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ─────────────────────────────────────────────────────────── */
    .mcp-topbar {
      background: #0052cc;
      color: #fff;
      padding: 11px 28px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 9px;
      user-select: none;
      flex-shrink: 0;
    }
    .mcp-topbar svg {
      width: 15px;
      height: 15px;
      fill: #fff;
      opacity: 0.9;
      flex-shrink: 0;
    }

    /* ── Card ────────────────────────────────────────────────────────────── */
    .mcp-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 36px rgba(0, 40, 100, 0.10);
      max-width: 680px;
      width: calc(100% - 32px);
      margin: 48px auto;
      padding: 44px 52px;
    }

    /* ── Typography ──────────────────────────────────────────────────────── */
    h1 {
      font-size: 1.55rem;
      font-weight: 700;
      margin: 0 0 10px;
      color: #111827;
    }
    .subtitle {
      color: #6b7a99;
      margin: 0 0 32px;
      font-size: 0.93rem;
      line-height: 1.55;
    }

    /* ── Status icons ────────────────────────────────────────────────────── */
    .status-icon {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      font-weight: 700;
      margin: 0 0 22px;
    }
    .status-icon.success { background: #e8f5e9; color: #2e7d32; }
    .status-icon.error   { background: #ffebee; color: #c62828; }

    small.meta {
      display: block;
      margin-top: 14px;
      color: #99aabb;
      font-size: 0.78rem;
    }

    {% block extra_css %}{% endblock %}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="mcp-topbar">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10
               c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2
               s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1
               1.71 0 3.1 1.39 3.1 3.1v2z"/>
    </svg>
    MCP Authentication
  </div>

  <div class="mcp-card">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
